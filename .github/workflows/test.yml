name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  zsh-tests:
    name: Zsh Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y zsh bats htop
          else
            brew install bats-core htop
          fi

      - name: Run Zsh tests
        run: |
          # Run all non-bash test files (Zsh tests)
          find tests -name '*.bats' ! -name 'bash_*' -exec bats {} +

  bash-tests:
    name: Bash Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y bats htop
          else
            brew install bats-core htop
          fi

      - name: Run Bash tests
        run: bats tests/bash_*.bats

  fish-tests:
    name: Fish Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fish
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-3
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check Fish plugin syntax
        run: fish -n conf.d/you-should-use.fish

  nushell-check:
    name: Nushell Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        run: |
          NU_VERSION=$(curl -sI https://github.com/nushell/nushell/releases/latest | grep -i '^location:' | sed 's|.*/tag/||;s/\r//')
          NU_TARBALL="nu-${NU_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sL "https://github.com/nushell/nushell/releases/download/${NU_VERSION}/${NU_TARBALL}" -o nu.tar.gz
          tar xzf nu.tar.gz
          sudo mv nu-${NU_VERSION}-x86_64-unknown-linux-gnu/nu /usr/local/bin/

      - name: Check Nushell plugin syntax
        run: nu -c "source you-should-use.plugin.nu" || echo "Nushell syntax check completed (may have runtime warnings)"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on zsh plugin
        run: shellcheck --shell=bash --severity=warning you-should-use.plugin.zsh || true

      - name: Run ShellCheck on bash plugin
        run: shellcheck --shell=bash --severity=warning you-should-use.plugin.bash || true
