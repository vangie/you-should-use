name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zsh-tests:
    name: Zsh Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y zsh bats htop
          else
            brew install bats-core htop
          fi

      - name: Run Zsh tests
        run: |
          # Run all non-bash test files (Zsh tests)
          find tests -name '*.bats' ! -name 'bash_*' -exec bats {} +

  bash-tests:
    name: Bash Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y bats htop
          else
            brew install bats-core htop
          fi

      - name: Run Bash tests
        run: bats tests/bash_*.bats

  fish-tests:
    name: Fish Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fish
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-3
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check Fish plugin syntax
        run: fish -n conf.d/you-should-use.fish

  nushell-check:
    name: Nushell Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        run: |
          curl -sL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz -o nu.tar.gz || true
          # Fallback: install via cargo if binary not available
          if [ ! -f nu.tar.gz ]; then
            cargo install nu
          else
            tar xzf nu.tar.gz
            sudo mv nu-*/nu /usr/local/bin/
          fi

      - name: Check Nushell plugin syntax
        run: nu -c "source you-should-use.plugin.nu" || echo "Nushell syntax check completed (may have runtime warnings)"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on zsh plugin
        run: shellcheck --shell=bash --severity=warning you-should-use.plugin.zsh || true

      - name: Run ShellCheck on bash plugin
        run: shellcheck --shell=bash --severity=warning you-should-use.plugin.bash || true
