name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zsh-tests:
    name: Zsh Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y zsh bats htop
          else
            brew install bats-core htop
          fi

      - name: Run tests
        run: bats tests/

  fish-tests:
    name: Fish Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fish
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-3
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check Fish plugin syntax
        run: fish -n conf.d/you-should-use.fish

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on zsh plugin
        run: shellcheck --shell=bash --severity=warning you-should-use.plugin.zsh || true
