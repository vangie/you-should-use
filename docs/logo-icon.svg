<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <filter id="bulb-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square (transparent outside the rounded corners) -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Terminal chevron > -->
  <path d="M44 80 L100 128 L44 176" stroke="#a6da95" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Underscore cursor -->
  <rect x="116" y="160" width="40" height="12" rx="4" fill="#cad3f5" opacity="0.9"/>

  <!-- Lightbulb -->
  <g transform="translate(192, 72)" filter="url(#bulb-glow)">
    <path d="M0,-28 C-16,-28 -26,-16 -26,0 C-26,10 -18,20 -11,25 L-11,32 L11,32 L11,25 C18,20 26,10 26,0 C26,-16 16,-28 0,-28 Z" fill="url(#glow)"/>
    <rect x="-9" y="32" width="18" height="4" rx="1" fill="#c4a000"/>
    <rect x="-7" y="38" width="14" height="4" rx="1" fill="#c4a000"/>
    <rect x="-5" y="44" width="10" height="4" rx="3" fill="#c4a000"/>
    <!-- Rays -->
    <line x1="0" y1="-38" x2="0" y2="-46" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-32" x2="26" y2="-38" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="-32" x2="-26" y2="-38" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="-6" x2="40" y2="-6" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-32" y1="-6" x2="-40" y2="-6" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>